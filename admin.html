<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Upload — EDU Routine Generator</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated background mesh -->
    <div class="bg-mesh"></div>

    <div class="admin-wrapper">
        <div class="glass-card admin-card">
            <div class="glass-card-body">
                <h1 class="admin-title">🔒 Admin Upload</h1>

                <div class="form-group">
                    <label for="password" class="form-label">Admin Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter admin password">
                </div>

                <div class="form-group">
                    <label for="fileInput" class="form-label">Routine File (.docx)</label>
                    <input type="file" id="fileInput" accept=".docx" class="file-input">
                </div>

                <div class="ramadan-toggle">
                    <input type="checkbox" id="ramadan-mode">
                    <label for="ramadan-mode">Enable Ramadan Mode 🌙</label>
                </div>

                <button onclick="uploadRoutine()" id="uploadBtn" class="btn-upload">
                    Upload &amp; Update
                </button>

                <p id="status" class="admin-status"></p>
            </div>
        </div>
    </div>

    <script>
        async function uploadRoutine() {
            const password = document.getElementById('password').value;
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');
            const isRamadan = document.getElementById('ramadan-mode').checked;

            if (!password) { alert("Enter a password!"); return; }
            if (fileInput.files.length === 0) { alert("Select a file!"); return; }

            btn.disabled = true;
            btn.textContent = "Processing...";
            status.innerHTML = '<span style="color: var(--warning);">Verifying & Uploading...</span>';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('password', password);
            formData.append('isRamadan', isRamadan);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    status.innerHTML = '<span style="color: var(--success); font-weight: 700;">✅ Success! Routine Updated.</span>';
                    btn.textContent = "Done";
                } else {
                    throw new Error(result.error || "Upload failed");
                }
            } catch (error) {
                console.error(error);
                status.innerHTML = `<span style="color: var(--error);">Error: ${error.message}</span>`;
                btn.disabled = false;
                btn.textContent = "Try Again";
            }
        }
    </script>
</body>
</html>
