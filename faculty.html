                            <stop offset="50%" stop-color="#8b5cf6" />
                            <stop offset="100%" stop-color="#a855f7" />

                    <rect x="17.5" y="26" width="5" height="3.5" rx="1" fill="white" opacity="0.9" />
                    <rect x="25" y="26" width="5" height="3.5" rx="1" fill="white" opacity="0.7" />
                    <circle cx="13" cy="8" r="1.2" fill="white" opacity="0.9" />
                    <circle cx="27" cy="8" r="1.2" fill="white" opacity="0.9" />
                </svg>
                <span class="logo-text-block">
                    <span class="logo-text-top">EDU Routine</span>
                    <span class="logo-text-accent">Generator</span>
                </span>
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
            <ul class="navbar-links" id="navbar-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="faculty.html" class="active">Faculty Search</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>Faculty Search</h1>
        <p>Type a short acronym or part of a faculty name to find the full name.</p>
    </header>

    <!-- Main Content -->
    <div class="faculty-search-wrapper">

        <!-- Status -->
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div id="faculty-status" class="status-badge loading">
                <span class="status-dot"></span>
                <span>Loading faculty data...</span>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar-container">
            <input type="text" id="faculty-search-input" placeholder="Search by acronym or name (e.g. MR, Rahman)..."
                disabled>
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>

        <!-- Results -->
        <div class="faculty-results" id="faculty-results">
            <div class="faculty-empty" id="faculty-empty">
                <div class="empty-icon">🔍</div>
                <p>Start typing to search for faculty members</p>
            </div>
        </div>
    </div>
